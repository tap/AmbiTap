<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AmbiTap panner</title>
<style>
    body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-content: center;
        gap: 12px;
        background: #101114;
        color: #c0c3c8;
        font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    h1 { font-size: 15px; font-weight: 600; margin: 18px 0 0; }
    canvas { touch-action: none; border-radius: 8px; }
    #readout { font-variant-numeric: tabular-nums; white-space: pre; color: #8a8f96; }
    p { max-width: 460px; color: #8a8f96; font-size: 12.5px; margin: 0 0 18px; }
</style>
</head>
<body>
<h1>AmbiTap panner — canvas host</h1>
<canvas id="panner" width="460" height="380"></canvas>
<div id="readout"></div>
<p>
    Drag a dot to set azimuth (front is up, left is stage-left); drag the
    right-hand ring to set elevation (top = zenith). The same widget file
    drives ambitap.encode~ in Max through the mgraphics backend.
</p>
<script type="module" src="./main.js"></script>
</body>
</html>
