name: Docs

# Build the Doxygen API site and publish it to GitHub Pages on every push to
# main. On pull requests, build only (no deploy) so doc breakage is caught in
# review without touching the live site.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Doxygen + Graphviz
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

      - name: Build the API site
        run: doxygen docs/Doxyfile

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html

  deploy:
    name: deploy to Pages
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Creates/enables the Pages site (Source: GitHub Actions) if the repo
      # doesn't have one yet — deploy-pages 404s otherwise.
      - name: Enable Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
