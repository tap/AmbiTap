name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  format:
    # The one-time reformat landed with the matching .clang-format; from here
    # on, formatting is enforced. Generated tables are excluded via
    # .clang-format-ignore and the explicit pathspecs below.
    name: clang-format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format-18
          clang-format-18 --dry-run --Werror \
            $(git ls-files '*.h' '*.cpp' \
              ':!:third_party/**' \
              ':!:include/ambitap/math/binaural/hrtf_data.h' \
              ':!:include/ambitap/math/geometry/tdesigns.h')

  build-test:
    # Compiler/OS matrix, warnings-as-errors everywhere.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gcc
            os: ubuntu-latest
            cc: gcc
            cxx: g++
          - name: linux-clang
            os: ubuntu-latest
            cc: clang
            cxx: clang++
          - name: macos-appleclang
            os: macos-latest
            cc: cc
            cxx: c++
          - name: windows-msvc
            os: windows-latest
            cc: cl
            cxx: cl
    name: build-test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          -DAMBITAP_WERROR=ON
          -DAMBITAP_BUILD_EXAMPLES=ON
          -DAMBITAP_BUILD_BENCH=ON
          -DAMBITAP_BUILD_CAPI=ON

      - name: Build
        run: cmake --build build --parallel --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure --build-config Release

      - name: Run examples (smoke)
        if: runner.os != 'Windows'
        run: |
          ./build/examples/encode_rotate_decode
          ./build/examples/binaural_render /tmp/orbit.wav

  sanitize:
    # ASan+UBSan and TSan legs. TSan is what guards the wait-free publish
    # path (rt_published / async_rebuilder) and the setter/process stress
    # tests in tests/test_dsp_threads.cpp.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: asan-ubsan
            flags: "-fsanitize=address,undefined -fno-sanitize-recover=all"
          - name: tsan
            flags: "-fsanitize=thread -fno-sanitize-recover=all -O1"
    name: sanitize (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="${{ matrix.flags }}"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  sofa:
    # The optional SOFA path is real code; build it so it cannot rot.
    name: sofa (build with AMBITAP_ENABLE_SOFA)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          -DAMBITAP_ENABLE_SOFA=ON -DAMBITAP_WERROR=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  embedded:
    # The embedded real-time profile must stay bare-metal-clean: the RT
    # subset (tools/embedded/rt_core_check.cpp documents it) cross-compiles
    # for Cortex-M55 with no exceptions, no RTTI, no threads, no Eigen, and
    # no hardware doubles (-Wdouble-promotion catches accidental promotion
    # in the per-sample paths). Links against newlib-nano + nosys to prove
    # nothing hidden is pulled in.
    name: embedded (cortex-m55 RT-profile gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install the Arm bare-metal toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi

      - name: Cross-compile the RT profile for Cortex-M55
        run: |
          arm-none-eabi-g++ -std=c++20 -mcpu=cortex-m55 -mthumb -mfloat-abi=hard \
            -fno-exceptions -fno-rtti -Os \
            -Wall -Wextra -Werror -Wdouble-promotion \
            -Iinclude \
            -c tools/embedded/rt_core_check.cpp -o rt_core_check.o
          arm-none-eabi-gcc -mcpu=cortex-m55 -mthumb -mfloat-abi=hard -Os \
            -c third_party/ooura/fftsg_float.c -o fftsg_float.o
          arm-none-eabi-g++ -mcpu=cortex-m55 -mthumb -mfloat-abi=hard \
            --specs=nosys.specs --specs=nano.specs \
            rt_core_check.o fftsg_float.o -o rt_core_check.elf
          arm-none-eabi-size rt_core_check.elf

  install:
    # find_package(AmbiTap) must actually work: install to a prefix, then
    # configure and build a minimal downstream consumer against it.
    name: install + find_package smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Eigen (the exported package declares it as a dependency)
        run: sudo apt-get update && sudo apt-get install -y libeigen3-dev

      - name: Configure, build, install
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DAMBITAP_BUILD_TESTS=OFF
          cmake --build build --parallel
          cmake --install build --prefix "$PWD/prefix"

      - name: Build a downstream consumer via find_package
        run: |
          mkdir consumer && cd consumer
          cat > main.cpp <<'EOF'
          #include <ambitap/ambitap.h>
          #include <cstdio>
          int main() {
              ambitap::dsp::encoder enc(3);
              enc.set_direction(0.5f, 0.1f);
              enc.snap_parameters();
              float out[16];
              enc.process_sample(1.0f, out);
              std::printf("W=%f\n", out[0]);
              return out[0] == 1.0f ? 0 : 1;
          }
          EOF
          cat > CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.24)
          project(consumer CXX)
          find_package(AmbiTap CONFIG REQUIRED)
          add_executable(consumer main.cpp)
          target_link_libraries(consumer PRIVATE AmbiTap::ambitap)
          EOF
          cmake -B build -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/prefix"
          cmake --build build
          ./build/consumer
